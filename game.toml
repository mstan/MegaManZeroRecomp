# Mega Man Zero (USA, AZCE, revision 0).
# Hybrid configuration consumed by both gba_recompile and the runtime.

[game]
name = "Mega Man Zero"
short_name = "megaman_zero"

[program]
name = "Mega Man Zero (USA)"
id = "AZCE"
load_address = 0x08000000
size = 0x00800000
entry_pc = 0x08000000
# Strict-static corpus policy: callbacks are admitted from observed LLE
# dispatch targets, not speculative literal words that merely resemble code.
speculative_literal_harvest = false
# Stable parallel translation units keep reviewed static-closure iterations
# practical without changing guest control flow or runtime behavior.
codegen_shards = 16

[identity]
sha1 = "193b14120119162518a73c70876f0b8bffdbd96e"
md5 = "b24a17d080a01a404cbf018ba42b9803"

[bios]
path = "../gbarecomp/bios/gba_bios.bin"
sha1 = "300c20df6731a33952ded8c436f7f186d25d3492"
hle = false

[rom]
path = "roms/megaman_zero_usa.gba"
sha1 = "193b14120119162518a73c70876f0b8bffdbd96e"

[save]
type = "sram"
size = 32768
path = "saves/megaman_zero_usa.sav"

[runtime]
debug_port = 19862
window_title = "MegaManZeroRecomp"

[video]
screen = "frontlit"
widescreen = 0

[audio]
shadow = false

